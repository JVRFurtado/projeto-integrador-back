services:

  api:
    build: .

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mysql

    volumes:
      - .:/app

  mysql:
    image: mysql:8

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_ramais

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./script.sql:/docker-entrypoint-initdb.d/script.sql

volumes:
  mysql_data: